<h2 id="the-problem">The Problem</h2>
<p>Seven major Czech dialectological resources exist — each excellent, each isolated:</p>
<table>
<thead>
<tr>
<th>Resource</th>
<th>Scope</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>ČJA</strong></td>
<td>Czech Language Atlas — 477 survey points, geographic forms</td>
</tr>
<tr>
<td><strong>SNČJ</strong></td>
<td>Spoken Czech — phonological variants with attestations</td>
</tr>
<tr>
<td><strong>SPJMS</strong></td>
<td>Spoken Czech in Moravia &amp; Silesia — village-level field cards</td>
</tr>
<tr>
<td><strong>SPJČ</strong></td>
<td>Spoken Czech in Bohemia</td>
</tr>
<tr>
<td><strong>PSJČ</strong></td>
<td>Historical dictionary of Czech</td>
</tr>
<tr>
<td><strong>ASSC</strong></td>
<td>Contemporary academic Czech — phraseology</td>
</tr>
<tr>
<td><strong>SSJČ</strong></td>
<td>Standard Czech — 114 000+ entries</td>
</tr>
</tbody>
</table>
<p><strong>A researcher answering one question about Moravian dialect forms needs to open seven browser tabs, issue queries in seven different interfaces, and synthesize the results by hand.</strong></p>
</section>

<h2 id="why-not-just-ask-an-llm">Why Not Just Ask an LLM?</h2>
<p>General-purpose LLMs (GPT-4, Claude) have broad knowledge but <strong>unreliable dialect geography</strong>:</p>
<ul>
<li>Confuse geographic distributions — Silesian forms attributed to Brněnsko</li>
<li>Invent survey-point attributions with false confidence</li>
<li>Cannot report what is <em>absent</em> from dictionaries</li>
<li>Cannot cite a specific dictionary entry, only training-data impressions</li>
</ul>
<blockquote>
<p>A model that <strong>searches</strong> dictionaries has a fundamentally different error profile than one that <strong>recalls</strong> from training. When it finds nothing, it can say so.</p>
</blockquote>

<h2 id="aiml--agentic-tool-use-loop">AI/ML — Agentic Tool-Use Loop</h2>
<p>The core AI technique: <strong>LLM as a retrieval-directing agent</strong>.</p>
<p>The model outputs structured directives in free text:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>I will look up dialectal forms for &quot;holka&quot; in Moravian sources.

[LOOKUP: holka | cja]
[LOOKUP: holka | sncj]
[FTSEARCH: dívka děvče holka | spjms]
</code></pre>
<p>The system:</p>
<ol>
<li>Intercepts directives with regex parsers</li>
<li>Executes against SQLite / ChromaDB</li>
<li>Injects results as a new turn</li>
<li>Repeats — up to <strong>5 rounds</strong></li>
</ol>
<p><strong>No native function-calling API required.</strong> The protocol is text-based, model-agnostic, and fully auditable.</p>
</section>

<h2 id="optional--what-is-hugging-face">[ optional ] What is Hugging Face?</h2>
<div class="columns">
<div>
<p><strong>Hugging Face</strong> is an open-source AI platform and model hub — the GitHub of machine learning models.</p>
<ul>
<li>Hosts <strong>500 000+</strong> pre-trained models, freely downloadable</li>
<li>Home of the <strong><code>sentence-transformers</code></strong> library we use</li>
<li>Models are published with training code, datasets, and benchmarks</li>
<li>Standard way to share and reuse NLP research</li>
</ul>
<p><strong>What we use from it:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> sentence_transformers <span class="hljs-keyword">import</span> SentenceTransformer

model = SentenceTransformer(
    <span class="hljs-string">&quot;paraphrase-multilingual-mpnet-base-v2&quot;</span>
)
embeddings = model.encode([<span class="hljs-string">&quot;holka&quot;</span>, <span class="hljs-string">&quot;děvče&quot;</span>, <span class="hljs-string">&quot;dívka&quot;</span>])
<span class="hljs-comment"># → three 768-dimensional vectors, close together</span>
</code></pre>
<p>The model is downloaded once, runs locally.</p>
</div>
<div>
<p><strong>Why it matters for research:</strong></p>
<ul>
<li>Models trained by top labs (Google, Microsoft, Meta) published openly</li>
<li>Researchers can use state-of-the-art NLP without training from scratch</li>
<li>The multilingual model we use was published by UKP Lab (TU Darmstadt) — downloaded by <strong>15 million+</strong> researchers</li>
</ul>
<blockquote>
<p>Hugging Face is to NLP models what CRAN is to R packages, or PyPI is to Python libraries — a trusted, versioned registry.</p>
</blockquote>
</div>
</div>

<h2 id="optional--what-are-embeddings">[ optional ] What Are Embeddings?</h2>
<div class="columns">
<div>
<p>An <strong>embedding</strong> maps a word or sentence to a point in high-dimensional space, such that <strong>meaning ≈ proximity</strong>.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>&quot;holka&quot;   → [0.12, -0.34, 0.87, … ]  (768 numbers)
&quot;děvče&quot;   → [0.11, -0.31, 0.85, … ]  ← nearby
&quot;auto&quot;    → [0.92,  0.54, -0.23, … ] ← far away
</code></pre>
<p><strong>You can do arithmetic on meaning:</strong></p>
<blockquote>
<p><em>king</em> − <em>man</em> + <em>woman</em> ≈ <em>queen</em></p>
</blockquote>
<p>This is not a trick — it reflects statistical regularities learned from billions of words of text.</p>
<p><strong>Sentence embeddings</strong> extend the same idea to whole sentences and paragraphs, enabling semantic search: &quot;find entries that <em>mean</em> something similar to this query.&quot;</p>
</div>
<div>
<p><strong>Origin — Tomáš Mikolov, Brno, 2013</strong></p>
<p>Word2Vec (Mikolov et al., 2013) was the first practical dense word embedding method. Published while Mikolov was at Google Brain; his doctoral research was done in Brno.</p>
<p><em>Mikolov did his MSc (2007) and PhD (2012) at FIT VUT — Faculty of Information Technology, Brno University of Technology.</em></p>
<p><strong>From words to sentences:</strong></p>
<table>
<thead>
<tr>
<th>Year</th>
<th>Method</th>
<th>What changed</th>
</tr>
</thead>
<tbody>
<tr>
<td>2013</td>
<td>Word2Vec</td>
<td>Word-level embeddings</td>
</tr>
<tr>
<td>2018</td>
<td>BERT</td>
<td>Context-aware; same word, different vector per context</td>
</tr>
<tr>
<td>2019</td>
<td>Sentence-BERT</td>
<td>Full sentence → single vector; enables fast similarity search</td>
</tr>
<tr>
<td>2020</td>
<td>Multilingual SBERT</td>
<td>50+ languages in one shared space</td>
</tr>
</tbody>
</table>
<p>We use <strong>Multilingual SBERT</strong> (the 2020 step) — that's <code>paraphrase-multilingual-mpnet-base-v2</code>.</p>
</div>
</div>
<p><strong>Reference:</strong> Mikolov et al. (2013). <em>Efficient Estimation of Word Representations in Vector Space.</em> arXiv:1301.3781.</p>
</section>

<h2 id="optional--what-is-a-vector-database">[ optional ] What is a Vector Database?</h2>
<div class="columns">
<div>
<p>A <strong>vector database</strong> stores and searches high-dimensional numerical vectors — not text or rows.</p>
<p><strong>Core operation — similarity search:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>query: &quot;animal sounds&quot;
  → embed → [0.21, -0.43, 0.87, …]  (768 dims)
  → find nearest vectors in the index
  → return top-k most similar entries
</code></pre>
<p>Unlike SQL (<code>WHERE text LIKE '…'</code>), similarity search finds <strong>conceptually related</strong> items even if they share no words.</p>
<p><strong>How it works internally:</strong></p>
<ul>
<li>Approximate Nearest Neighbour (ANN) index (HNSW, IVF…)</li>
<li>Cosine or dot-product distance</li>
<li>Scales to millions of vectors with sub-millisecond queries</li>
</ul>
</div>
<div>
<p><strong>Typical use cases:</strong></p>
<table>
<thead>
<tr>
<th>Use case</th>
<th>What's stored</th>
</tr>
</thead>
<tbody>
<tr>
<td>Semantic search</td>
<td>Document / paragraph embeddings</td>
</tr>
<tr>
<td>Recommendation</td>
<td>User &amp; item embeddings</td>
</tr>
<tr>
<td>RAG retrieval</td>
<td>Knowledge-base chunk embeddings</td>
</tr>
<tr>
<td>Image search</td>
<td>CNN feature vectors</td>
</tr>
</tbody>
</table>
<p><strong>What we use: ChromaDB</strong> — lightweight, embedded, no server required. Runs in-process alongside the app; vectors stored on disk as a persistent collection.</p>
<div style="font-size: 0.9rem;">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">collection.query(
    query_embeddings=[query_vec],
    n_results=<span class="hljs-number">10</span>,
    where={<span class="hljs-string">&quot;dict_id&quot;</span>: <span class="hljs-string">&quot;cja&quot;</span>},   <span class="hljs-comment"># metadata filter</span>
)
</code></pre>
</div>
<p>163 000+ dictionary entries indexed; per-dictionary filtering via metadata so a VSEARCH can target one or all sources.</p>
</div>
</div>
</section>

<h2 id="aiml--dense-retrieval">AI/ML — Dense Retrieval</h2>
<div class="columns">
<div>
<p>Vector index built with <strong><code>paraphrase-multilingual-mpnet-base-v2</code></strong>:</p>
<ul>
<li>768-dimensional embeddings</li>
<li>Trained on 50+ languages</li>
<li>163 000+ entries embedded at index time</li>
<li>Stored in ChromaDB with <code>dict_id</code> metadata for filtered search</li>
<li>Query embedded at runtime → cosine similarity → top-k</li>
</ul>
<p><strong>VSEARCH → LOOKUP chain:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>[VSEARCH: povel pro koně]
  → hý, hyja, čmel, hop, br, prr
[LOOKUP: hý | cja]
[LOOKUP: hyja | sncj]
  → confirmed entries with full text
</code></pre>
</div>
<div>
<p><strong>Why multilingual?</strong></p>
<p>Czech dialect entries mix:</p>
<ul>
<li>Czech base forms</li>
<li>German loanwords (<em>fěrtoch, lajbl, šněrovačka</em>)</li>
<li>Slovak cognates</li>
<li>Latin glosses</li>
</ul>
<p>A multilingual model handles these in a shared embedding space without language-switching.</p>
<p><em>See optional slides: What is Hugging Face / What are Embeddings</em></p>
</div>
</div>

<h2 id="aiml--grounding--citation-verification">AI/ML — Grounding &amp; Citation Verification</h2>
<p>Every <code>[[Dict:word]]</code> link in the final answer is <strong>verified against the lookup log</strong> before delivery.</p>
<h3 id="citation-check-pass">Citation check pass</h3>
<p>After the main loop, the system:</p>
<ol>
<li>Extracts all <code>[[DICT:word]]</code> links from the draft answer</li>
<li>Cross-references each against the session's lookup results</li>
<li>If any link has no lookup hit → model is asked to correct or remove it</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">unverified = [link <span class="hljs-keyword">for</span> link <span class="hljs-keyword">in</span> citations <span class="hljs-keyword">if</span> link <span class="hljs-keyword">not</span> <span class="hljs-keyword">in</span> lookup_hits]
<span class="hljs-keyword">if</span> unverified:
    inject_citation_check_message(unverified)
    <span class="hljs-comment"># model revises before final delivery</span>
</code></pre>
<h3 id="cumulative-lookup-history">Cumulative lookup history</h3>
<p>Every round receives the <strong>full history</strong> of (term, dict) → hit-count pairs from all prior rounds, preventing the model from repeating lookups it already issued.</p>

<h2 id="aiml--leakage-detection">AI/ML — Leakage Detection</h2>
<p>Four categories of output defects detected automatically after each answer:</p>
<table>
<thead>
<tr>
<th>Category</th>
<th>Pattern</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Tool leak</strong></td>
<td><code>[LOOKUP:…]</code> in final answer</td>
<td>Model forgot to convert directive to prose</td>
</tr>
<tr>
<td><strong>Broken citation</strong></td>
<td><code>[[ASSC:[stoupnout…]]]</code></td>
<td>ASSC headwords contain <code>[</code>; breaks markup parser</td>
</tr>
<tr>
<td><strong>Instruction leak</strong></td>
<td>&quot;v tomto sezení&quot;, &quot;kolo N/N&quot;</td>
<td>System-prompt internals surfacing in user text</td>
</tr>
<tr>
<td><strong>ID leak</strong></td>
<td><code>`cja`</code> instead of &quot;ČJA&quot;</td>
<td>Internal dict key used instead of display name</td>
</tr>
</tbody>
</table>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">TOOL_RE        = re.<span class="hljs-built_in">compile</span>(<span class="hljs-string">r&#x27;\[(LOOKUP|FTSEARCH|VSEARCH):[^\]]*\]&#x27;</span>)
BROKEN_CITE_RE = re.<span class="hljs-built_in">compile</span>(<span class="hljs-string">r&#x27;\[\[(ČJA|SNČJ|…):\[&#x27;</span>)
INSTR_RE       = re.<span class="hljs-built_in">compile</span>(<span class="hljs-string">r&#x27;v tomto sezení|kolo\s+\d+/\d+|…&#x27;</span>)
ID_LEAK_RE     = re.<span class="hljs-built_in">compile</span>(<span class="hljs-string">r&#x27;`(cja|sncj|spjms|…)`&#x27;</span>)
</code></pre>
</section>

<h2 id="agentic-eval-loop--automated-eval">Agentic Eval Loop — <code>/automated-eval</code></h2>
<div class="columns">
<div>
<p><a href="eval-loop.svg" target="_blank"><img src="eval-loop.svg" style="height:300px; display:block; margin:0 auto;" /></a></p>
<p>Human reviews report → approves fixes → re-run.</p>
<p><strong>16 prompt iterations</strong> (P1–P16) driven by successive eval runs.<br />
The command file itself evolves too — leakage detection added after finding output defects in eval results.</p>
</div>
<div>
<p>Agent executes <strong>7 steps</strong> autonomously:</p>
<ol>
<li>Read query corpus → find answerable questions</li>
<li>Run all queries: <code>test_prompt.py --dict-mode --save</code></li>
<li>Export PDF per conversation</li>
<li>Analyze: zero-result rate · phrase searches · leakage scan · rounds used</li>

<h2 id="llm-as-a-judge--agents-evaluating-agents">LLM as a Judge — Agents Evaluating Agents</h2>
<div class="columns">
<div>
<p><strong>The paradigm</strong> (Zheng et al., 2023):<br />
Use a capable LLM to evaluate LLM outputs at scale — faster and more consistent than human annotation.</p>
<p><strong>Our implementation — hybrid approach:</strong></p>
<table>
<thead>
<tr>
<th>Layer</th>
<th>Method</th>
<th>LLM?</th>
</tr>
</thead>
<tbody>
<tr>
<td>Zero-result rate</td>
<td>DB log counts</td>
<td>No</td>
</tr>
<tr>
<td>Phrase search rate</td>
<td>Regex on lookup terms</td>
<td>No</td>
</tr>
<tr>
<td>Leakage detection</td>
<td>4 regex patterns</td>
<td>No</td>
</tr>
<tr>
<td>Coverage &amp; grounding</td>
<td>Qualitative analysis</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Claude</td>
</tr>
<tr>
<td>Issue catalogue</td>
<td>Pattern synthesis</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Claude</td>
</tr>
</tbody>
</table>
<p>Structured metrics ground the LLM's qualitative judgment — it cannot rate an answer highly if the DB logs show 60% zero-result lookups.</p>
</div>
<div>
<p><strong>The meta-angle:</strong></p>
<p>The <strong>evaluator</strong> (Claude Code running <code>/automated-eval</code>) and the <strong>system being evaluated</strong> (dictpert's multi-round LLM retrieval loop) are both large language models.</p>
<p>We use one LLM to systematically improve another.</p>
<blockquote>
<p>Prompt changes are proposed by Claude,<br />
reviewed by a human, implemented by Claude,<br />
and verified by Claude.<br />
The human's role is judgment and direction —<br />
not execution.</p>
</blockquote>
<p><strong>Reference:</strong> Zheng et al. (2023). <em>Judging LLM-as-a-Judge with MT-Bench and Chatbot Arena.</em> NeurIPS 2023.</p>
</div>
</div>
</section>

<h2 id="technique--geographic-correlation">Technique — Geographic Correlation</h2>
<p><strong>Problem:</strong> ČJA encodes survey points as numeric codes (<code>84</code>, <code>818</code>, <code>701</code>). The LLM had no way to map these to villages, leading to geographic hallucination (Silesian forms attributed to Brněnsko).</p>
<p><strong>Solution:</strong> Inline locality substitution</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Before: raw entry text</span>
<span class="hljs-string">&quot;ďevčo 84, 818; děvčo 701&quot;</span>

<span class="hljs-comment"># After: _substitute_localities() replaces codes inline</span>
<span class="hljs-string">&quot;ďevčo Český Těšín/Karviná, Velké Petrovice/Náchod; děvčo Šumperk/Šumperk&quot;</span>
</code></pre>
<p><strong>How codes were resolved:</strong></p>
<ol>
<li>SPJMS <code>obce</code> table → fuzzy village-name join (70% coverage)</li>
<li>OSM Nominatim geocoding API (rate-limited 1 req/s) → remaining 30%</li>
<li>Manual correction of 5 Nominatim errors using ČJA geographic context</li>
</ol>
<p><strong>Result:</strong> Geographic error eliminated. Model now correctly places Silesian forms in Karviná/Náchod.</p>
</section>

<h2 id="technique--data-enrichment--denormalization">Technique — Data Enrichment &amp; Denormalization</h2>
<h3 id="spjms-field-cards">SPJMS field cards</h3>
<p>Raw database: <code>cards</code> → <code>obce</code> (village codes) → <code>objekty</code> (informant categories)</p>
<p>Denormalized at query time:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>BOUDA, bóda  [búda]  (střední vrstva)  — Lhota u Vsetína  (pozn: starší)
BOUDA        [bouda] (inteligence)     — Zlín
</code></pre>
<p><strong>Effect on Q17 (bouda variants in Moravia):</strong> 4 rounds → 2 rounds, 26% → 0% zero-result rate.</p>
<h3 id="fts-content-enrichment">FTS content enrichment</h3>
<p>SPJMS FTS index JOINs village names into the indexed text via correlated subquery — village names are searchable even without knowing headwords.</p>

<h2 id="summary">Summary</h2>
<p><strong>dictpert</strong> is a grounded, multi-source RAG system for Czech dialectological research.</p>
<p>The key insight is not the LLM — it's the <strong>retrieval and verification layer</strong> that makes LLM output auditable and traceable to sources.</p>
<p>Techniques: agentic tool-use loop · dense retrieval · FTS5 · geographic enrichment · citation verification · leakage detection · systematic evaluation</p>
<p>The entire project — scrapers, backends, eval framework, prompt iteration, this presentation — was built with Claude Code. The underlying dictionaries are the work of decades of human linguists; the AI amplifies access to that knowledge.</p>
<blockquote>
<p>It doesn't replace expertise — it reduces the friction between a researcher's question and the evidence that exists to answer it, and it makes the limits of that evidence explicit.</p>
</blockquote>
</section>

<h2 id="b1--model-paraphrase-multilingual-mpnet-base-v2">B1 — Model: paraphrase-multilingual-mpnet-base-v2</h2>
<p><strong>Architecture:</strong> MPNet (Microsoft, 2020) — combines masked language modelling with permuted language modelling for stronger token dependency modelling than BERT.</p>
<p><strong>Fine-tuning:</strong> sentence-transformers paraphrase training on 50+ languages, ~1 billion sentence pairs (Reimers &amp; Gurevych 2020). The model learns to map <em>meaning-equivalent</em> sentences to nearby points in 768-dimensional space regardless of surface form or language.</p>
<p><strong>Why this model for Czech dialectology:</strong></p>
<table>
<thead>
<tr>
<th>Property</th>
<th>Value</th>
<th>Relevance</th>
</tr>
</thead>
<tbody>
<tr>
<td>Embedding dim</td>
<td>768</td>
<td>Good capacity for domain-specific semantic space</td>
</tr>
<tr>
<td>Languages</td>
<td>50+</td>
<td>Czech, Slovak, German, Latin all in shared space</td>
</tr>
<tr>
<td>Max tokens</td>
<td>128</td>
<td>Sufficient for dictionary entry snippets</td>
</tr>
<tr>
<td>Model size</td>
<td>278 MB</td>
<td>Runs on CPU without GPU hardware</td>
</tr>
</tbody>
</table>
<p><strong>Alternative considered:</strong> <code>czert-b</code> (Czech-only BERT) — better Czech morphology but no multilingual embedding space, rules out cross-lingual loanword matching.</p>
<p><strong>Reference:</strong> Reimers &amp; Gurevych (2020). <em>Making Monolingual Sentence Embeddings Multilingual using Knowledge Distillation.</em> EMNLP 2020.</p>
</section>

<h2 id="b2--hyde-hypothetical-document-embeddings-planned">B2 — HyDE: Hypothetical Document Embeddings <em>(planned)</em></h2>
<p><strong>Problem with keyword queries for vector search:</strong><br />
The user asks <em>&quot;povel pro koně&quot;</em> (command for horses). Embedding this question puts it near other <em>questions</em>, not near dictionary <em>entries</em> about horse commands.</p>
<p><strong>HyDE approach</strong> (Gao et al. 2022):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Step 1 — Generate hypothetical entry:
  &quot;hý: citoslovce. Povel pro koně k zastavení nebo otočení. 
   Varianty: hýja, híja (Morava). Doklady: ...&quot;

Step 2 — Embed the hypothetical entry (not the question)

Step 3 — Retrieve real entries by cosine similarity to the hypothesis
</code></pre>
<p>The hypothesis embeds <em>much closer</em> to real dictionary entries than a plain question does — because it has the same syntactic structure, register, and vocabulary as the target.</p>
<p><strong>Expected gain:</strong> Higher precision in top-k retrieval for semantic queries, reducing the need for follow-up LOOKUP rounds.</p>
<p><strong>Reference:</strong> Gao et al. (2022). <em>Precise Zero-Shot Dense Retrieval Without Relevance Labels.</em> arXiv:2212.10496.</p>
</section>
